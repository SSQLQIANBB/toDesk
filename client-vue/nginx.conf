map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_accept_encoding $br_suffix {
    default "";
    "~*br" ".br";
}

map $br_suffix $br_encoding {
    default "";
    ".br" "br";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    location = /index.html {
        default_type text/html;
        gzip_static on;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location ~* ^/assets/.+\.(?:js|mjs)$ {
        default_type application/javascript;
        gzip_static on;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location ~* ^/assets/.+\.css$ {
        default_type text/css;
        gzip_static on;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location ~* ^/assets/.+\.json$ {
        default_type application/json;
        gzip_static on;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location ~* ^/assets/.+\.svg$ {
        default_type image/svg+xml;
        gzip_static on;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location ~* ^/assets/.+\.(?:txt|xml|wasm)$ {
        gzip_static on;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header Content-Encoding $br_encoding always;

        try_files $uri$br_suffix $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /meeting {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /connect {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
