services:
  backend:
    image: ${DOCKERHUB_NAMESPACE:-ssq5603151}/todesk-backend:${IMAGE_TAG:-latest}
    container_name: todesk-backend
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    volumes:
      - todesk-uploads:/app/backend-koa/uploads
    networks:
      - todesk-internal
      - bill-network

  web:
    image: ${DOCKERHUB_NAMESPACE:-ssq5603151}/todesk-web:${IMAGE_TAG:-latest}
    container_name: todesk-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - todesk-internal

volumes:
  todesk-uploads:

networks:
  todesk-internal:
    driver: bridge

  bill-network:
    external: true
    name: ${BILL_DOCKER_NETWORK}
