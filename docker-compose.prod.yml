services:
  backend:
    image: ${DOCKERHUB_NAMESPACE:-ssq5603151}/todesk-backend:${IMAGE_TAG:-latest}
    container_name: todesk-backend
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    volumes:
      - todesk-uploads:/app/backend-koa/uploads
    networks:
      - todesk-internal
      - shared-services

  web:
    image: ${DOCKERHUB_NAMESPACE:-ssq5603151}/todesk-web:${IMAGE_TAG:-latest}
    container_name: todesk-web
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - todesk-internal

  caddy:
    image: caddy:2-alpine
    container_name: todesk-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - todesk-internal

volumes:
  todesk-uploads:
  caddy-data:
  caddy-config:

networks:
  todesk-internal:
    driver: bridge

  shared-services:
    external: true
    name: ${SHARED_SERVICES_NETWORK:-shared-services}
