name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image names
        run: |
          echo "NAMESPACE=${DOCKERHUB_NAMESPACE:-ssq5603151}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${BACKEND_IMAGE:-todesk-backend}" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=${WEB_IMAGE:-todesk-web}" >> "$GITHUB_ENV"
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE }}
          WEB_IMAGE: ${{ vars.WEB_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-koa/Dockerfile
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=todesk-backend
          cache-to: type=gha,mode=max,scope=todesk-backend

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client-vue/Dockerfile
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.NAMESPACE }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=todesk-web
          cache-to: type=gha,mode=max,scope=todesk-web

      - name: Package application images for server transfer
        run: |
          set -euo pipefail
          docker pull "${NAMESPACE}/${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker pull "${NAMESPACE}/${WEB_IMAGE}:${GITHUB_SHA}"
          docker save "${NAMESPACE}/${BACKEND_IMAGE}:${GITHUB_SHA}" \
            | gzip -1 > todesk-backend.tar.gz
          docker save "${NAMESPACE}/${WEB_IMAGE}:${GITHUB_SHA}" \
            | gzip -1 > todesk-web.tar.gz

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          fingerprint: ${{ secrets.SERVER_SSH_FINGERPRINT }}
          port: 22
          script: |
            set -e
            mkdir -p /opt/todesk
            test -f /opt/todesk/.env.production

      - name: Upload production compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          fingerprint: ${{ secrets.SERVER_SSH_FINGERPRINT }}
          port: 22
          command_timeout: 30m
          source: docker-compose.prod.yml,Caddyfile,todesk-backend.tar.gz,todesk-web.tar.gz
          target: /opt/todesk

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          fingerprint: ${{ secrets.SERVER_SSH_FINGERPRINT }}
          port: 22
          script: |
            set -e
            cd /opt/todesk
            DOMAIN="$(sed -n 's/^DOMAIN=//p' .env.production | tail -n 1)"
            SHARED_SERVICES_NETWORK="$(
              sed -n 's/^SHARED_SERVICES_NETWORK=//p' .env.production | tail -n 1
            )"
            : "${DOMAIN:?DOMAIN is required in /opt/todesk/.env.production}"
            SHARED_SERVICES_NETWORK="${SHARED_SERVICES_NETWORK:-shared-services}"
            docker network inspect "$SHARED_SERVICES_NETWORK" >/dev/null
            test -n "$(
              docker ps -q --filter network="$SHARED_SERVICES_NETWORK" \
                --filter label=com.docker.compose.service=mysql \
                --filter health=healthy
            )"
            test -n "$(
              docker ps -q --filter network="$SHARED_SERVICES_NETWORK" \
                --filter label=com.docker.compose.service=redis \
                --filter health=healthy
            )"
            export DOCKERHUB_NAMESPACE="${{ env.NAMESPACE }}"
            export IMAGE_TAG="${{ github.sha }}"
            gzip -dc todesk-backend.tar.gz | docker load
            gzip -dc todesk-web.tar.gz | docker load
            rm -f todesk-backend.tar.gz todesk-web.tar.gz
            docker compose --env-file .env.production -f docker-compose.prod.yml \
              up -d --pull never --remove-orphans
            docker image prune -f
            for i in $(seq 1 12); do
              if curl --resolve "${DOMAIN}:443:127.0.0.1" \
                -fsS "https://${DOMAIN}/" >/dev/null; then
                exit 0
              fi
              sleep 5
            done
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
            docker compose --env-file .env.production -f docker-compose.prod.yml \
              logs --tail=100 caddy backend
            exit 1
