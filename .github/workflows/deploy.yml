name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image names
        run: |
          echo "NAMESPACE=${DOCKERHUB_NAMESPACE:-ssq5603151}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${BACKEND_IMAGE:-todesk-backend}" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=${WEB_IMAGE:-todesk-web}" >> "$GITHUB_ENV"
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE }}
          WEB_IMAGE: ${{ vars.WEB_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-koa/Dockerfile
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=todesk-backend
          cache-to: type=gha,mode=max,scope=todesk-backend

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client-vue/Dockerfile
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.NAMESPACE }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=todesk-web
          cache-to: type=gha,mode=max,scope=todesk-web

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            mkdir -p /opt/todesk
            test -f /opt/todesk/.env.production

      - name: Upload production compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: docker-compose.prod.yml
          target: /opt/todesk

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /opt/todesk
            export DOCKERHUB_NAMESPACE="${{ env.NAMESPACE }}"
            export IMAGE_TAG="${{ github.sha }}"
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
                exit 0
              fi
              sleep 5
            done
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
            exit 1
